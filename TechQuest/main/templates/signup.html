<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - TechQuest</title>
    <link rel="stylesheet" href="../static/signup.css">
</head>

<body>
    <h1 class="title">TechQuest</h1>

    <div class="form-container">
        <h2 class="form-title">Create an Account</h2>

        <form>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
            </div>

            <div class="password-requirements" id="password-requirements" style="display: none;">
                <h4>Password Requirements:</h4>
                <ul>
                    <li id="req-length">Must contain at least 8 characters</li>
                    <li id="req-personal">Can't be too similar to personal information</li>
                    <li id="req-common">Can't be a commonly used password</li>
                    <li id="req-numeric">Can't be entirely numeric</li>
                </ul>
            </div>
            <div class="button-wrapper">
                <button type="submit" id="submit-btn">Create Account</button>
            </div>
        </form>

        <div class="login-link">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</body>

</html>
