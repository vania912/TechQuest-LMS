<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #a6c0fe, #f68084);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 72px;
            font-weight: 900;
            color: #320A6B;
            margin-bottom: 30px;
            animation: popBounce 1.2s ease-in-out forwards;
        }

        .signup-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1.2s ease-in-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #f68084;
        }

        .btn-custom {
            background-color: #f68084;
            border: none;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #d95d6a;
        }
    </style>
</head>

<body>
<div class="title">TechQuest</div>
    <div class="signup-container w-100" style="max-width: 500px;">
       
        <h2 class="text-center mb-4">Create an Account</h2>

        <form method="POST" novalidate>
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-custom w-100 mt-3">Sign Up</button>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </div>

</body>

</html>
