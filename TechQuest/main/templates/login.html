<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login - TechQuest</title>
  <!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"> -->

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Times New Roman', Times, serif;
      background: linear-gradient(120deg, #a6c0fe, #f68084);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      animation: fadeSlide 1s ease-out;
    }

    @keyframes fireFlowPurple {
      0% {
        background-position: 0% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .title {
      position: relative;
      display: inline-block;
      font-size: 72px;
      font-weight: 900;
      background: linear-gradient(to right, #1f0542 0%, #967ecb 100%);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      cursor: default;
      margin-bottom: 30px;
      transition: background-position 0.4s ease-in-out;
      animation: popBounce 1s ease-in-out forwards;
    }

    /* On Hover — Animate Gradient Movement */
    .title:hover {
      animation: fireFlowPurple 1.5s linear infinite, popBounce 1.2s ease-in-out forwards;
    }




    .auth-box {

      padding: 30px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(50, 10, 107, 0.1);
      background-color: #ffffff;
      width: 460px;
      animation: slideUp 1s ease-out;
    }

    .auth-box h2 {
      color: #1E1B3A;
      margin-bottom: 35px;
      font-size: 36px;
      font-weight: 700;
    }

    .auth-box input {
      background: #e5e5ef;
      width: 100%;
      padding: 18px 18px;
      margin-bottom: 25px;
      border: none;
      border-radius: 10px;

      color: #fff;
      font-size: 15px;
      outline: none;
      transition: 0.3s ease;
    }

    .auth-box input:focus {
      outline: 2px solid #00C2CB;
    }

    .auth-box button {
      font-family: 'Times New Roman', Times, serif;
      width: 100%;
      padding: 20px;
      background-color: #320A6B;
      color: white;
      border: 2px solid #320A6B;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.4s ease;
    }

    .auth-box button:hover {
      background-color: #a6c0fe;
      color: #3a0c7b;
      border-color: #D6C3FF;
      font-weight: 900 bolder !important;
      text-transform: uppercase;
    }

    .auth-box p {
      text-align: center;
      margin-top: 18px;
    }

    .auth-box a {
      color: #00C2CB;
      text-decoration: none;
      font-weight: 500;
    }

    .auth-box a:hover {
      text-decoration: underline;
    }

    .auth-box button {
      position: relative;
      overflow: hidden;
      z-index: 1;
      width: 100%;
      padding: 12px;
      background-color: #320A6B;
      color: white;
      border: 2px solid #320A6B;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: color 0.4s ease, border-color 0.3s ease;
    }

    /* Animated background from left to right */
    .auth-box button::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background-color: #D6C3FF;
      z-index: -1;
      transition: width 0.4s ease-in-out;
    }

    /* Hover effect */
    .auth-box button:hover::before {
      width: 100%;
    }

    .auth-box button:hover {
      color: #320A6B;
      border: 2px solid #320A6B;
    }




    /* Animations */
    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popBounce {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }

      60% {
        transform: scale(1.1);
        opacity: 1;
      }

      100% {
        transform: scale(1);
      }
    }

    .auth-box button {
      position: relative;
      overflow: hidden;
      z-index: 1;
      width: 40%;
      padding: 14px 25px;
      background-color: #320A6B;
      color: #D6C3FF;
      border: 2px solid #320A6B;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.5s ease;
    }

    /* Pseudo-element for animation */
    .auth-box button::before {
      content: "";
      position: absolute;
      top: 0;
      /* left: -100%; */
      /* width: 100%;
      height: 100%; */
      background-color: #D6C3FF;
      transition: all 0.4s ease-in-out;
      z-index: -1;
    }

    /* Hover effect with slide-in */
    .auth-box button:hover::before {
      left: 0;
    }

    /* Text and border color on hover */
    .auth-box button:hover {
      color: #320A6B;
      border: 2px solid #320A6B;
      font-weight: 600;
    }
  </style>
</head>

<body role="main">
  <div class="container">
    <div class="title">TechQuest</div>
    <div class="auth-box">
      <h2>Login</h2>
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" aria-label="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
  </div>
</body>

</html>
